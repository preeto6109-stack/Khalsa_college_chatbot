    <link rel="stylesheet" href="style.css">

                        <ellipse cx="62" cy="44" rx="7" ry="14" fill="#3D1F0A"/>
                        <!-- Face -->
                        <ellipse cx="40" cy="36" rx="17" ry="18" fill="#FDDBB4"/>
                        <!-- Hair top / fringe -->
                        <ellipse cx="40" cy="20" rx="18" ry="10" fill="#4A2505"/>
                        <path d="M24 24 Q28 14 40 13 Q52 14 56 24 Q50 18 40 18 Q30 18 24 24Z" fill="#4A2505"/>
                        <!-- Eyes -->
                        <ellipse cx="33" cy="35" rx="3" ry="3.2" fill="#fff"/>

                        <circle cx="34.5" cy="34.5" r="0.6" fill="white"/>
                        <circle cx="48.5" cy="34.5" r="0.6" fill="white"/>
                        <!-- Eyebrows -->
                        <path d="M30 31 Q33 29.5 36 31" stroke="#3D1F0A" stroke-width="1.3" fill="none" stroke-linecap="round"/>
                        <path d="M44 31 Q47 29.5 50 31" stroke="#3D1F0A" stroke-width="1.3" fill="none" stroke-linecap="round"/>
                        <!-- Nose -->
                        <path d="M39 38 Q40 40 41 38" stroke="#E8A87C" stroke-width="1" fill="none" stroke-linecap="round"/>
                        <!-- Smile -->
                        <path d="M34 43 Q40 48 46 43" stroke="#C4637A" stroke-width="1.6" fill="none" stroke-linecap="round" class="smile"/>
                        <!-- Cheeks blush -->
                        <ellipse cx="28" cy="41" rx="4" ry="2.5" fill="rgba(232,160,176,0.45)"/>
                        <ellipse cx="52" cy="41" rx="4" ry="2.5" fill="rgba(232,160,176,0.45)"/>
                        <!-- Dupatta/scarf -->
                        <path d="M18 56 Q20 48 25 46 Q32 58 40 58 Q48 58 55 46 Q60 48 62 56 Q56 70 40 72 Q24 70 18 56Z" fill="#C4637A"/>
                        <path d="M25 46 Q32 54 40 54 Q48 54 55 46" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
                        <!-- Kurta -->
                        <path d="M22 58 Q20 68 20 80 L60 80 Q60 68 58 58 Q50 62 40 62 Q30 62 22 58Z" fill="#9B8FC4"/>
                        <!-- Dupatta detail dots -->
                        <circle cx="32" cy="50" r="1" fill="rgba(255,255,255,0.4)"/>
                        <circle cx="40" cy="52" r="1" fill="rgba(255,255,255,0.4)"/>
                        <circle cx="48" cy="50" r="1" fill="rgba(255,255,255,0.4)"/>
                    </svg>
                    <!-- Blink overlay -->
                    <div class="avatar-blink"></div>
                </div>
                <div>
                    <h1>Khalsa College Patiala</h1>
                     <p>kaur · College  Assistant ✨</p>
                </div>
            </div>

            <!-- Right: Lang Toggle + Dark Mode + Clear -->
            <div class="header-actions">
                <div class="lang-toggle" id="langToggle">
                    <button class="lang-btn" data-lang="pa" onclick="setLanguage('pa')" title="Punjabi">ਪੰਜਾਬੀ</button>
                    <button class="lang-btn" data-lang="hi" onclick="setLanguage('hi')" title="Hindi">हिंदी</button>
                    <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')" title="English">EN</button>
                </div>
                <button class="clear-btn" id="dark-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="clear-btn" onclick="clearChat()" title="Clear Chat">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>

        <!-- ── Office Status Bar ── -->
        <div id="office-status-bar" class="office-status-bar"></div>

        <!-- ── Messages ── -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- ── Input ── -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input
                    type="text"
                    class="chat-input"
                    id="chatInput"
                    placeholder="Ask about admissions, courses, fees..."
                    onkeypress="handleKeyPress(event)"
                    autocomplete="off"
                />
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

    </div>

    <!-- ── WhatsApp Floating Button ── -->
    <a  id="whatsapp-float"
        href="https://wa.me/911752215835?text=Hello%2C%20I%20have%20an%20inquiry%20about%20Khalsa%20College%20Patiala"
        target="_blank"
        rel="noopener noreferrer"
        title="Chat on WhatsApp">

</body>
